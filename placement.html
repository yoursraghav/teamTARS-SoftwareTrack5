<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuizBot</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f1117;
  color: #e8eaf0;
}

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 14px 20px;
  background: #181c27;
  border-bottom: 1px solid #2a2f3f;
  font-weight: bold;
}

.content {
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

/* cards */
.course-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1f2e;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #2a2f3f;
}

.course-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  background: #2a2f3f;
  margin-right: 10px;
}

.course-info {
  flex: 1;
  margin-left: 10px;
}

.course-name {
  font-weight: bold;
}

.progress-bar {
  height: 6px;
  background: #2a2f3f;
  border-radius: 4px;
  margin-top: 6px;
}

.progress-fill {
  height: 100%;
  background: #6c63ff;
  border-radius: 4px;
}

.start-quiz-btn {
  background: #6c63ff;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* chips */
.course-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  padding: 6px 10px;
  border: 1px solid #333;
  border-radius: 20px;
  cursor: pointer;
}

.chip.selected {
  background: #6c63ff;
  color: white;
}

/* quiz */
.q-card {
  background: #1a1f2e;
  padding: 16px;
  border-radius: 10px;
}

.option {
  padding: 10px;
  margin: 6px 0;
  background: #2a2f3f;
  border-radius: 8px;
  cursor: pointer;
}

.option:hover {
  background: #3a3f55;
}

.feedback-box {
  margin-top: 10px;
  padding: 10px;
  background: #222;
  border-left: 4px solid #6c63ff;
}

.btn-submit, button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  background: #6c63ff;
  color: white;
  cursor: pointer;
}

/* loading */
.loading-overlay {
  text-align: center;
  padding: 60px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #333;
  border-top: 4px solid #6c63ff;
  border-radius: 50%;
  margin: auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="app">
  <div class="topbar">🔥 QuizBot</div>

  <!-- IMPORTANT: JS TARGET -->
  <div class="content" id="main-content"></div>
</div>

<!-- YOUR JS FILE -->
<script src="app.js"></script>

</body>
</html>
