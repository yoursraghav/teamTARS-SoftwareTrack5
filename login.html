<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — Sign In</title>

<!-- LINK YOUR CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="left-top">
      <div class="tag">Smart Education Platform</div>
      <h1>Learn smarter.<br>Grow faster.<br>Get placed.</h1>
      <p>Adaptive learning + placement tracking 🚀</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <h2>Welcome back</h2>
    <div class="sub">Sign in to continue your learning streak 🔥</div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign in</div>
      <div class="tab" onclick="switchTab('signup')">Sign up</div>
    </div>

    <!-- LOGIN -->
    <div class="login-form">
      <div class="field">
        <input id="login-email" placeholder="Email">
      </div>

      <div class="field">
        <input id="login-pass" type="password" placeholder="Password">
      </div>

      <div class="error-msg" id="login-error">Invalid credentials</div>

      <button class="btn-primary" onclick="doLogin()">Login</button>
    </div>

    <!-- SIGNUP -->
    <div class="signup-form">
      <div class="field">
        <input id="su-name" placeholder="Name">
      </div>

      <div class="field">
        <input id="su-email" placeholder="Email">
      </div>

      <div class="field">
        <input id="su-pass" type="password" placeholder="Password" oninput="checkStrength(this.value)">
        <div class="strength-bar" id="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
      </div>

      <div class="field">
        <input id="su-univ" placeholder="College">
      </div>

      <div class="error-msg" id="signup-error">Fill all fields</div>
      <div class="success-msg" id="signup-success">Success!</div>

      <button class="btn-primary" onclick="doSignup()">Signup</button>
    </div>

  </div>

</div>

<!-- JS -->
<script>
if (localStorage.getItem('isLoggedIn') === 'true') {
  window.location.href = 'index.html';
}
</script>

</body>
</html>
