<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuestLog — Gamified Dashboard</title>
  <link rel="stylesheet" href="style-gamified.css" />
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="menu-toggle" aria-label="Open menu"><span class="menu-icon">☰</span></button>
      <div class="brand">
        <span class="brand-mark">QL</span>
        <div>
          <div class="brand-name">QuestLog</div>
          <div class="brand-subtitle">Level up your learning</div>
        </div>
      </div>
      <div class="top-right">
        <div class="streak">Streak: <strong id="streak-value">5</strong> days</div>
        <button class="profile-btn" aria-label="View profile">AS</button>
      </div>
    </div>

    <aside class="side-menu" id="side-menu">
      <div class="menu-header">
        <div>
          <div class="menu-title">Quest Board</div>
          <div class="menu-subtitle">Choose your mission</div>
        </div>
        <button class="menu-close" aria-label="Close menu"><span class="menu-icon">✕</span></button>
      </div>
      <nav>
        <button class="nav-item active" data-page="courses">Courses</button>
        <button class="nav-item" data-page="todo">To Do List</button>
        <button class="nav-item" data-page="quizzes">Quizzes</button>
        <button class="nav-item" data-page="achievements">Achievements</button>
        <button class="nav-item" data-page="analysis">Analysis</button>
        <button class="nav-item" data-page="placement">Placement Cell</button>
        <button class="nav-item" data-page="friends">Friends</button>
        <button class="nav-item" data-page="logout">Logout</button>
      </nav>
    </aside>
    <div class="overlay" id="overlay"></div>

    <main class="content" id="main-content"></main>
    <div id="quizbot-root"></div>
  </div>
  <script src="app.js"></script>
  <script src="quizbot.js"></script>
</body>
</html>
